<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDT - Azienda Agricola Cristina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="section-page active" id="ddt-section">
        <div class="section-header">
            <div>
                <button onclick="window.location.href='index.html'" class="back-btn">← Torna alla Home</button>
                <h2>Documenti di Trasporto (DDT)</h2>
            </div>
            <button id="add-ddt-btn">Nuovo DDT</button>
        </div>
        <div class="data-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Totale</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="ddt-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center;">Caricamento...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for creating/editing DDT -->
    <div class="modal" id="ddt-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="ddt-modal-title">Nuovo DDT</h3>
                <button class="close-btn" onclick="closeDDTModal()">&times;</button>
            </div>
            <form class="modal-form" id="ddt-form">
                <label>Cliente</label>
                <select id="ddt-cliente" required>
                    <option value="">Seleziona cliente</option>
                </select>
                <label>Data</label>
                <input type="date" id="ddt-data" required>
                
                <div style="border-top: 1px solid #e0e0e0; margin: 20px 0; padding-top: 20px;">
                    <h4 style="margin-bottom: 15px;">Aggiungi Articoli</h4>
                    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px;">
                        <div>
                            <label style="font-size: 12px;">Articolo</label>
                            <select id="ddt-articolo-select">
                                <option value="">Seleziona articolo</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 12px;">Quantità</label>
                            <input type="number" id="ddt-quantita" step="0.01" placeholder="0.00">
                        </div>
                        <div>
                            <label style="font-size: 12px;">Prezzo Unitario</label>
                            <input type="number" id="ddt-prezzo" step="0.01" placeholder="0.00">
                        </div>
                        <div style="display: flex; align-items: flex-end;">
                            <button type="button" onclick="addDDTRiga()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold;">+</button>
                        </div>
                    </div>
                </div>
                
                <div id="ddt-righe-container"></div>
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn" onclick="closeDDTModal()">Annulla</button>
                    <button type="submit" class="save-btn">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="ddt.js"></script>
</body>
</html>
