<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azienda Agricola Cristina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-section">
        <div class="login-container">
            <img src="logo.png" alt="Azienda Agricola Cristina" class="logo">
            <h1>Azienda Agricola Cristina</h1>
            <p>Accedi al sistema</p>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Accedi</button>
            </form>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="main-section" style="display: none;">
        <div class="header">
            <img src="logo.png" alt="Azienda Agricola Cristina" class="logo-small">
            <h1>Azienda Agricola Cristina</h1>
            <button id="logout-btn">Logout</button>
        </div>
        <div class="menu-container">
            <button class="menu-btn" data-section="ddt">
                <div class="icon">📋</div>
                <div class="label">DDT</div>
            </button>
            <button class="menu-btn" data-section="fatture">
                <div class="icon">📄</div>
                <div class="label">Fatture</div>
            </button>
            <button class="menu-btn" data-section="articoli">
                <div class="icon">📦</div>
                <div class="label">Articoli</div>
            </button>
            <button class="menu-btn" data-section="clienti">
                <div class="icon">👥</div>
                <div class="label">Clienti</div>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
