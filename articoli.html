<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articoli - Azienda Agricola Cristina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="section-page active" id="articoli-section">
        <div class="section-header">
            <div>
                <button onclick="window.location.href='index.html'" class="back-btn">← Torna alla Home</button>
                <h2>Articoli</h2>
            </div>
            <button id="add-articolo-btn">Nuovo Articolo</button>
        </div>
        <div class="data-table">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Descrizione</th>
                        <th>Unità Misura</th>
                        <th>Prezzo Unitario</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="articoli-table-body">
                    <tr>
                        <td colspan="5" style="text-align: center;">Caricamento...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for creating/editing Articolo -->
    <div class="modal" id="articolo-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="articolo-modal-title">Nuovo Articolo</h3>
                <button class="close-btn" onclick="closeArticoloModal()">&times;</button>
            </div>
            <form class="modal-form" id="articolo-form">
                <label>Nome</label>
                <input type="text" id="articolo-nome" required>
                <label>Descrizione</label>
                <textarea id="articolo-descrizione" rows="3"></textarea>
                <label>Unità Misura</label>
                <input type="text" id="articolo-unita" placeholder="es. kg, pz, litri">
                <label>Prezzo Unitario</label>
                <input type="number" step="0.01" id="articolo-prezzo" placeholder="0.00">
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn" onclick="closeArticoloModal()">Annulla</button>
                    <button type="submit" class="save-btn">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="articoli.js"></script>
</body>
</html>
